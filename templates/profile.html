{% extends 'base.html' %}
{% block title %}Musteri Bilgisi{% endblock %}
{% block content %}
<section class="card">
    <div class="section-head">
        <div>
            <h1>Musteri Bilgisi</h1>
            <p>Mumkun oldugunca hizli doldurulacak sekilde sade tutuldu.</p>
        </div>
    </div>
    <form method="post" class="form-grid two-columns">
        <label>Yas<input type="number" name="age" value="{{ profile.age if profile else '' }}" required></label>
        <label>Cinsiyet
            <select name="gender" required>
                <option value="">Sec</option>
                <option value="male" {% if profile and profile.gender=='male' %}selected{% endif %}>Erkek</option>
                <option value="female" {% if profile and profile.gender=='female' %}selected{% endif %}>Kadin</option>
            </select>
        </label>
        <label>Boy (cm)<input type="number" step="0.1" name="height" value="{{ profile.height if profile else '' }}" required></label>
        <label>Kilo (kg)<input type="number" step="0.1" name="weight" value="{{ profile.weight if profile else '' }}" required></label>
        <label>Hedef Kilo (kg)<input type="number" step="0.1" name="target_weight" value="{{ profile.target_weight if profile else '' }}"></label>
        <label>Hedef
            <select name="goal" required>
                <option value="lose" {% if profile and profile.goal=='lose' %}selected{% endif %}>Yag kaybi</option>
                <option value="maintain" {% if profile and profile.goal=='maintain' %}selected{% endif %}>Koru</option>
                <option value="recomp" {% if profile and profile.goal=='recomp' %}selected{% endif %}>Recomp</option>
                <option value="gain" {% if profile and profile.goal=='gain' %}selected{% endif %}>Kas kazanimi</option>
            </select>
        </label>
        <label>Aktivite
            <select name="activity_level" required>
                <option value="sedentary" {% if profile and profile.activity_level=='sedentary' %}selected{% endif %}>Sedanter</option>
                <option value="light" {% if profile and profile.activity_level=='light' %}selected{% endif %}>Hafif</option>
                <option value="moderate" {% if profile and profile.activity_level=='moderate' %}selected{% endif %}>Orta</option>
                <option value="active" {% if profile and profile.activity_level=='active' %}selected{% endif %}>Aktif</option>
                <option value="very_active" {% if profile and profile.activity_level=='very_active' %}selected{% endif %}>Cok aktif</option>
            </select>
        </label>
        <label>Seviye
            <select name="experience_level" required>
                <option value="beginner" {% if profile and profile.experience_level=='beginner' %}selected{% endif %}>Baslangic</option>
                <option value="intermediate" {% if profile and profile.experience_level=='intermediate' %}selected{% endif %}>Orta</option>
                <option value="advanced" {% if profile and profile.experience_level=='advanced' %}selected{% endif %}>Ileri</option>
            </select>
        </label>
        <label>Haftalik Gun<input type="number" name="workout_days" min="2" max="6" value="{{ profile.workout_days if profile else 4 }}" required></label>
        <label>Ekipman
            <select name="equipment" required>
                <option value="gym" {% if profile and profile.equipment=='gym' %}selected{% endif %}>Salon</option>
                <option value="home" {% if profile and profile.equipment=='home' %}selected{% endif %}>Ev ekipmani</option>
                <option value="bodyweight" {% if profile and profile.equipment=='bodyweight' %}selected{% endif %}>Ekipmansiz</option>
            </select>
        </label>
        <label>Beslenme
            <select name="diet_preference" required>
                <option value="balanced" {% if profile and profile.diet_preference=='balanced' %}selected{% endif %}>Normal</option>
                <option value="vegetarian" {% if profile and profile.diet_preference=='vegetarian' %}selected{% endif %}>Vejetaryen</option>
                <option value="vegan" {% if profile and profile.diet_preference=='vegan' %}selected{% endif %}>Vegan</option>
            </select>
        </label>
        <label>Ogun Sayisi<input type="number" name="meals_per_day" min="3" max="6" value="{{ profile.meals_per_day if profile else 4 }}" required></label>
        <label>Uyku (saat)<input type="number" step="0.5" name="sleep_hours" value="{{ profile.sleep_hours if profile else '' }}"></label>
        <label>Su Hedefi (L)<input type="number" step="0.1" name="water_goal_liters" value="{{ profile.water_goal_liters if profile else '' }}"></label>
        <label>Supplement
            <select name="supplement_preference">
                <option value="simple" {% if profile and profile.supplement_preference=='simple' %}selected{% endif %}>Basit</option>
                <option value="performance" {% if profile and profile.supplement_preference=='performance' %}selected{% endif %}>Performans</option>
                <option value="none" {% if profile and profile.supplement_preference=='none' %}selected{% endif %}>Yok</option>
            </select>
        </label>
        <label class="full">Sakatlik / Kisit<textarea name="injuries" rows="3">{{ profile.injuries if profile else '' }}</textarea></label>
        <label class="full">Saglik Notu<textarea name="health_notes" rows="3">{{ profile.health_notes if profile else '' }}</textarea></label>
        <div class="full action-row">
            <button class="btn" type="submit">Bilgileri Kaydet</button>
            <a href="{{ url_for('dashboard') }}" class="btn secondary">Panele Don</a>
        </div>
    </form>
</section>
{% endblock %}
